max_tokens: 800
deny_patterns:
  - id: R-PI-001
    category: PromptInjection
    description: Prompt injection — "ignore previous instructions"
    pattern: "(?i)ignore (all|any|previous) (instructions|rules)"
    severity: 3

  - id: R-PI-002
    category: DataExfiltration
    description: Attempts to exfiltrate credentials or secrets
    pattern: "(?i)(export|leak).*(password|secret|api[-_ ]?key)"
    severity: 4

  - id: R-PI-003
    category: PII
    description: Asks for social security numbers
    pattern: "(?i)(ssn|social security number)"
    severity: 5

  - id: R-PI-004
    category: SafetyBypass
    description: Jailbreak phrases
    pattern: "(?i)(jailbreak|do anything now|DAN)"
    severity: 2

