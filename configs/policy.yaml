# ===== LLM-ASG Policy (Step 7) =====
max_tokens: 2048

# --- NEW: normalize inputs before matching (defeats spacing/punctuation tricks)
normalization:
  lower: true
  unicode_nfkc: true
  collapse_whitespace: true      # turn tabs/newlines/multiple spaces into single spaces
  strip_punctuation_runs: true   # collapse long punctuation runs (e.g., i.n.s.t.r.u.c.t.i.o.n.s)
  max_input_chars: 12000         # cut pathological payloads early

# Canonical reason codes used in logs/metrics/UI
reason_codes:
  PII_DETECTED: "Personally identifiable information detected"
  OUTPUT_PII: "PII present in model output"
  PROMPT_INJECTION: "Prompt injection attempt"
  SAFETY_BYPASS: "Attempt to bypass safety/role constraints"
  DATA_EXFIL_PATTERN: "Data exfiltration intent or secret extraction"
  SECRETS_DETECTED: "Credential/secret pattern detected"
  SQLI_ATTEMPT: "SQL exfil or credential dump pattern"
  RATE_LIMIT: "Rate limit exceeded"
  UNKNOWN: "Unspecified/other policy violation"

# Toggleable detectors (fast, configurable)
detectors:
  pii:
    enabled: true
    types: [ssn, phone, email, credit_card]
    redact: true
    keep_last4: true
    reason_code: PII_DETECTED
    custom_patterns:
      - id: PII-IPV4
        description: IPv4 address
        pattern: '(?i)\b(?:(?:25[0-5]|2[0-4]\d|1?\d{1,2})\.){3}(?:25[0-5]|2[0-4]\d|1?\d{1,2})\b'
      - id: PII-MAC
        description: MAC address
        pattern: '(?i)\b(?:[0-9A-F]{2}[:-]){5}[0-9A-F]{2}\b'
      - id: PII-SSN-STRICT
        description: U.S. SSN strict
        pattern: '\b(?!000|666|9\d{2})\d{3}[- ]?(?!00)\d{2}[- ]?(?!0000)\d{4}\b'

  jailbreak:
    enabled: true
    patterns:
      # ignore/override previous instructions/rules/guardrails
      - '(?is)\b(ignore|disregard|override|forget)\b.{0,40}\b(prev(ious)?|above|earlier)\b.{0,40}\b(instructions?|rules?|polic(y|ies)|guardrails?)\b'
      - '(?is)\bfrom\s+now\s+on\b.{0,50}\b(no|without)\b.{0,10}\b(rules?|limits?|restrictions?)\b'
      # roleplay/pretend to bypass
      - '(?is)\b(role[- ]?play|pretend|act\s+as)\b.{0,80}\b(ignore|bypass|no\s*rules|unfiltered|uncensored)\b'
      # jailbreak memes
      - '(?is)\b(do\s*anything\s*now|DAN|jailbreak|dev\s*mode|uncensored\s*mode)\b'
      # solicit system prompt/hidden instructions
      - '(?is)\b(print|show|reveal|expose|leak|repeat|dump|display)\b.{0,80}\b(system\s*prompt|hidden\s*instructions?|developer\s*messages?|internal\s*guidelines?)\b'
      # “answer as an unrestricted model / disable safety”
      - '(?is)\b(answer|respond)\b.{0,40}\b(as|like)\b.{0,40}\b(unrestricted|unfiltered|no\s*policy|no\s*safety)\b'
      # “ignore this message only” tricks
      - '(?is)\bignore\b.{0,40}\b(previous|prior|earlier)\b.{0,40}\b(message|context)\b'
      # research justification to bypass
      - '(?is)\bthis\s+is\s+for\s+research|academic\s+purposes\b.{0,40}\bignore\b.{0,20}\bsafety\b'
    reason_code: PROMPT_INJECTION

  exfil:
    enabled: true
    patterns:
      # generic exfil synonyms
      - '(?is)\b(export|leak|dump|exfiltrate|extract|retrieve|steal|enumerate|list|expose)\b.{0,80}\b(passwords?|secrets?|api[-_ ]?keys?|tokens?|credentials?)\b'
      # SQL dump / credential tables (support backticks/quotes)
      - '(?is)\bselect\b.{0,120}\bfrom\b.{0,120}\b(`?users?`?|`?credentials?`?|`?passwords?`?)\b'
      - '(?is)\b(information_schema|sqlite_master|mysql\.user)\b'
      # Unix credential files
      - '(?is)\bcat\b.{0,20}/etc/(?:passwd|shadow)\b'
      # Windows credential artifacts
      - '(?is)\b(type|copy)\b.{0,40}\bC:\\\\Windows\\\\System32\\\\config\\\\SAM\b'
      - '(?is)\breg\s+save\b.{0,80}\bSAM\b'
      - '(?is)\bAppData\\\Roaming\\\Mozilla\\\Firefox\\\Profiles\b'
      # SSH keys / private materials
      - '(?is)\b(id_rsa|id_ecdsa|known_hosts)\b'
      # High-signal token formats
      - '(?i)\b(?:ASIA|AKIA|A3T)[0-9A-Z]{16}\b'           # AWS Access Key ID
      - '(?i)\baws(.{0,20})?(secret|access).{0,20}key\b' # AWS “secret/access key” phrase
      - '(?i)\bghp_[A-Za-z0-9]{36}\b'                    # GitHub PAT
      - '(?i)\bAIza[0-9A-Za-z\-_]{35}\b'                 # Google API key
      - '(?i)\bxox[baprs]-[A-Za-z0-9-]{10,48}\b'         # Slack token
      - '(?i)\bsk_(?:live|test)_[0-9a-zA-Z]{24,}\b'      # Stripe
      - '(?i)\bsk_[0-9a-zA-Z]{20,}\b'                    # generic sk_ tokens
      - '(?i)-----BEGIN (?:RSA|EC|OPENSSH|PGP) PRIVATE KEY-----'
    reason_code: SECRETS_DETECTED

# Your existing keyword rules, now with explicit reason_code
deny_patterns:
  # Prompt injection & jailbreak
  - id: R-PI-001
    category: PromptInjection
    description: Ignore/override previous instructions or rules
    pattern: '(?is)\b(ignore|disregard|override|forget)\b.{0,40}\b(prev(ious)?|above|earlier)\b.{0,40}\b(instructions?|rules?|polic(y|ies)|guardrails?)\b'
    severity: 4
    reason_code: PROMPT_INJECTION

  - id: R-PI-004
    category: SafetyBypass
    description: Jailbreak memes and “do anything now”
    pattern: '(?is)\b(do\s*anything\s*now|DAN|jailbreak|dev\s*mode|uncensored\s*mode)\b'
    severity: 3
    reason_code: SAFETY_BYPASS

  - id: R-PI-005
    category: PromptInjection
    description: Reveal system prompt / hidden instructions
    pattern: '(?is)\b(print|show|reveal|expose|leak|repeat|dump|display)\b.{0,80}\b(system\s*prompt|hidden\s*instructions?|developer\s*messages?|internal\s*guidelines?)\b'
    severity: 4
    reason_code: PROMPT_INJECTION

  - id: R-PI-006
    category: PromptInjection
    description: Roleplay/pretend to bypass safety or “answer as an unfiltered model”
    pattern: '(?is)\b(role[- ]?play|pretend|act\s+as)\b.{0,80}\b(ignore|bypass|no\s*rules|unfiltered|uncensored|no\s*safety)\b'
    severity: 4
    reason_code: SAFETY_BYPASS

  # PII request
  - id: R-PI-003
    category: PII
    description: Asks for social security numbers
    pattern: '(?is)\b(ssn|social\s*security\s*number(s)?)\b'
    severity: 5
    reason_code: PII_DETECTED

  # Secrets & exfil attempts
  - id: R-PI-002
    category: DataExfiltration
    description: Attempts to exfiltrate credentials or secrets
    pattern: '(?is)\b(export|leak|dump|exfiltrate|extract|retrieve|steal|enumerate|list|expose)\b.{0,80}\b(passwords?|secrets?|api[-_ ]?keys?|tokens?|credentials?)\b'
    severity: 5
    reason_code: DATA_EXFIL_PATTERN

  - id: R-SCRT-001
    category: Secrets
    description: AWS Access Key ID format
    pattern: '(?i)\b(?:ASIA|AKIA|A3T)[0-9A-Z]{16}\b'
    severity: 5
    reason_code: SECRETS_DETECTED

  - id: R-SCRT-002
    category: Secrets
    description: GitHub token format
    pattern: '(?i)\bghp_[A-Za-z0-9]{36}\b'
    severity: 5
    reason_code: SECRETS_DETECTED

  - id: R-SCRT-003
    category: Secrets
    description: Google API key format
    pattern: '(?i)\bAIza[0-9A-Za-z\-_]{35}\b'
    severity: 5
    reason_code: SECRETS_DETECTED

  - id: R-SCRT-004
    category: Secrets
    description: Stripe secret key
    pattern: '(?i)\bsk_(?:live|test)_[0-9a-zA-Z]{24,}\b'
    severity: 5
    reason_code: SECRETS_DETECTED

  - id: R-SCRT-005
    category: Secrets
    description: Private key material header
    pattern: '(?i)-----BEGIN (?:RSA|EC|OPENSSH|PGP) PRIVATE KEY-----'
    severity: 5
    reason_code: SECRETS_DETECTED

  - id: R-SQL-001
    category: DataExfiltration
    description: SQL dump of user/credential tables
    pattern: '(?is)\bselect\b.{0,120}\bfrom\b.{0,120}\b(`?users?`?|`?credentials?`?|`?passwords?`?)\b'
    severity: 4
    reason_code: SQLI_ATTEMPT

  - id: R-OS-001
    category: DataExfiltration
    description: OS credential file exfil (Unix/Windows)
    pattern: '(?is)\b(cat\b.{0,20}/etc/(?:passwd|shadow)|\b(type|copy)\b.{0,40}C:\\\\Windows\\\\System32\\\\config\\\\SAM|\breg\s+save\b.{0,80}\bSAM\b)\b'
    severity: 4
    reason_code: DATA_EXFIL_PATTERN

# Multi-stage evaluation chain (defense-in-depth)
decision_chain:
  - keyword_filter        # deny_patterns, cheap regex
  - semantic_classifier   # small transformer / embedding similarity
  - llm_judge             # optional, budgeted fallback for borderline cases

# What to do in each case
actions:
  on_violation: block_with_reason   # include reason_code + offending_rule
  on_uncertain: escalate_or_mask    # escalate to llm_judge or mask/redact

# Response/output guards (post-generation scan)
response_guards:
  enabled: true
  recheck_output: true
  quarantine_on_violation: true
  reason_code_on_output_violation: OUTPUT_PII

# Resilience & abuse controls
rate_limit:
  enabled: true
  requests_per_minute: 60
  burst: 10
  reason_code_on_limit: RATE_LIMIT

# Observability configuration (for Grafana/Prometheus & logs)
telemetry:
  emit_reason_codes: true
  metrics:
    requests_counter: asg_requests_total                 # labels: decision, reason_code
    rule_hits_counter: asg_policy_hits_total             # labels: rule_id, reason_code
    pii_leaks_counter: asg_pii_leaks_total               # labels: stage (input|output)
    added_latency_histogram: asg_added_latency_ms_bucket # labels: stage (keyword|semantic|judge|total)
  logs:
    include_fields:
      - trace_id
      - stage              # keyword|semantic|judge|response_guard
      - decision           # allow|block|mask|quarantine
      - reason_code        # from reason_codes above
      - rule_id            # e.g., R-PI-001 (if applicable)
      - category           # PromptInjection, PII, etc.
      - severity
      - elapsed_ms
    redact_pii_in_logs: true

# User-facing error templates (no policy internals leaked)
messages:
  blocked_generic: "This request can’t be processed due to policy restrictions."
  blocked_pii: "This request includes sensitive personal data that cannot be processed."
  blocked_jailbreak: "The request attempts to bypass safety controls and was blocked."
  blocked_exfil: "The request appears to request secrets or exfiltrate data and was blocked."
  masked_output: "Certain sensitive details were redacted to protect privacy."

# Optional: allow-list examples (evaluated early, before deny)
allow_list:
  enabled: false
  patterns: []


