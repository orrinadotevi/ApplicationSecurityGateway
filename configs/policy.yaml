# ===== LLM-ASG Policy (Step 7) =====
max_tokens: 800

# Canonical reason codes used in logs/metrics/UI
reason_codes:
  PII_DETECTED: "Personally identifiable information detected"
  OUTPUT_PII: "PII present in model output"
  PROMPT_INJECTION: "Prompt injection attempt"
  SAFETY_BYPASS: "Attempt to bypass safety/role constraints"
  DATA_EXFIL_PATTERN: "Data exfiltration intent or secret extraction"
  SECRETS_DETECTED: "Credential/secret pattern detected"
  SQLI_ATTEMPT: "SQL exfil or credential dump pattern"
  RATE_LIMIT: "Rate limit exceeded"
  UNKNOWN: "Unspecified/other policy violation"

# Toggleable detectors (fast, configurable)
detectors:
  pii:
    enabled: true
    types: [ssn, phone, email, credit_card]   # add ip/mac via custom patterns below
    redact: true
    keep_last4: true
    reason_code: PII_DETECTED
    custom_patterns:
      # IPv4 with strict octets
      - id: PII-IPV4
        description: IPv4 address
        pattern: '(?i)\b(?:(?:25[0-5]|2[0-4]\d|1?\d{1,2})\.){3}(?:25[0-5]|2[0-4]\d|1?\d{1,2})\b'
      # MAC address
      - id: PII-MAC
        description: MAC address
        pattern: '(?i)\b(?:[0-9A-F]{2}[:-]){5}[0-9A-F]{2}\b'
      # Lean SSN with invalid ranges filtered
      - id: PII-SSN-STRICT
        description: U.S. SSN strict
        pattern: '\b(?!000|666|9\d{2})\d{3}[- ]?(?!00)\d{2}[- ]?(?!0000)\d{4}\b'

  jailbreak:
    enabled: true
    patterns:
      - '(?i)\b(ignore|disregard|override)\b.*\b(instructions?|rules?|policies|guardrails?)\b'
      - '(?i)\bdo\s*anything\s*now\b|\bDAN\b|\bjailbreak\b|\bdev\s*mode\b|\buncensored\s*mode\b'
      - '(?i)\bfrom\s+now\s+on\b.*\b(no|without)\s*(rules|limits|restrictions)\b'
      - '(?i)\b(role[- ]?play|pretend)\b.*\b(ignore|bypass|no\s*rules)\b'
      - '(?i)\b(print|show|reveal|expose|leak|repeat)\b.*\b(system\s*prompt|hidden\s*instructions?|developer\s*messages?)\b'
      - '(?i)\bwhat\s+are\s+your\s+(rules|instructions|guardrails|content\s*policy)\b'
      - '(?i)\bignore\b.*\bprevious\b.*\bmessage\b'
      - '(?i)\brespond\s+as\s+an\s+unfiltered\s+model\b'
      - '(?i)\bthis\s+is\s+for\s+research\b.*\bignore\b.*\bsafety\b'
    reason_code: PROMPT_INJECTION

  exfil:
    enabled: true
    patterns:
      - '(?i)\b(export|leak|dump|exfiltrate|retrieve|steal|list|enumerate)\b.*\b(passwords?|secrets?|api[-_ ]?keys?|tokens?|credentials?)\b'
      - '(?i)\bdump\b.*\b(database|secrets?)\b'
      - '(?i)\bcat\s+/(?:etc/(?:passwd|shadow))\b'
      - '(?i)\bSELECT\b.*\bFROM\b.*\b(users?|credentials?|passwords?)\b'
      # High-signal secret formats (no capture of actual token in logs)
      - '(?i)\bAKIA[0-9A-Z]{16}\b'                                 # AWS Access Key ID
      - '(?i)\b(?:ASIA|A3T|AKIA)[0-9A-Z]{16}\b'                    # AWS variants
      - '(?i)\baws(.{0,20})?(secret|access).{0,20}key\b'           # AWS secret phrases
      - '(?i)\bghp_[A-Za-z0-9]{36}\b'                              # GitHub PAT
      - '(?i)\bAIza[0-9A-Za-z\-_]{35}\b'                           # Google API key
      - '(?i)\bxox[baprs]-[A-Za-z0-9-]{10,48}\b'                   # Slack
      - '(?i)\bsk_(?:live|test)_[0-9a-zA-Z]{24,}\b'                # Stripe
      - '(?i)-----BEGIN (?:RSA|EC|OPENSSH|PGP) PRIVATE KEY-----'   # Private key header
    reason_code: SECRETS_DETECTED

# Your existing keyword rules, now with explicit reason_code
deny_patterns:
  - id: R-PI-001
    category: PromptInjection
    description: Prompt injection — "ignore previous instructions"
    pattern: "(?i)ignore (all|any|previous) (instructions|rules)"
    severity: 3
    reason_code: PROMPT_INJECTION

  - id: R-PI-002
    category: DataExfiltration
    description: Attempts to exfiltrate credentials or secrets
    pattern: "(?i)(export|leak).*(password|secret|api[-_ ]?key)"
    severity: 4
    reason_code: DATA_EXFIL_PATTERN

  - id: R-PI-003
    category: PII
    description: Asks for social security numbers
    pattern: "(?i)(ssn|social security number)"
    severity: 5
    reason_code: PII_DETECTED

  - id: R-PI-004
    category: SafetyBypass
    description: Jailbreak phrases
    pattern: "(?i)(jailbreak|do anything now|DAN)"
    severity: 2
    reason_code: SAFETY_BYPASS

    # NEW — prompt-injection/system prompt exfil
  - id: R-PI-005
    category: PromptInjection
    description: Reveal system prompt / hidden instructions
    pattern: '(?i)\b(print|show|reveal|expose|leak|repeat)\b.*\b(system\s*prompt|hidden\s*instructions?)\b'
    severity: 4
    reason_code: PROMPT_INJECTION

  - id: R-PI-006
    category: PromptInjection
    description: Roleplay to bypass safety
    pattern: '(?i)\b(role[- ]?play|pretend)\b.*\b(no\s*rules|ignore|bypass)\b'
    severity: 3
    reason_code: SAFETY_BYPASS

  # NEW — secrets & credentials
  - id: R-SCRT-001
    category: Secrets
    description: AWS Access Key ID format
    pattern: '(?i)\b(?:ASIA|AKIA|A3T)[0-9A-Z]{16}\b'
    severity: 5
    reason_code: SECRETS_DETECTED

  - id: R-SCRT-002
    category: Secrets
    description: GitHub token format
    pattern: '(?i)\bghp_[A-Za-z0-9]{36}\b'
    severity: 5
    reason_code: SECRETS_DETECTED

  - id: R-SCRT-003
    category: Secrets
    description: Google API key format
    pattern: '(?i)\bAIza[0-9A-Za-z\-_]{35}\b'
    severity: 5
    reason_code: SECRETS_DETECTED

  - id: R-SCRT-004
    category: Secrets
    description: Stripe secret key
    pattern: '(?i)\bsk_(?:live|test)_[0-9a-zA-Z]{24,}\b'
    severity: 5
    reason_code: SECRETS_DETECTED

  - id: R-SCRT-005
    category: Secrets
    description: Private key material
    pattern: '(?i)-----BEGIN (?:RSA|EC|OPENSSH|PGP) PRIVATE KEY-----'
    severity: 5
    reason_code: SECRETS_DETECTED

  # NEW — SQL credential/exfil attempts (cheap keyword guard)
  - id: R-SQL-001
    category: DataExfiltration
    description: SQL dump of user tables
    pattern: '(?i)\bSELECT\b.*\bFROM\b.*\b(users?|credentials?|passwords?)\b'
    severity: 4
    reason_code: SQLI_ATTEMPT

  - id: R-OS-001
    category: DataExfiltration
    description: OS file exfil (passwd/shadow)
    pattern: '(?i)\bcat\s+/(?:etc/(?:passwd|shadow))\b'
    severity: 4
    reason_code: DATA_EXFIL_PATTERN

# Multi-stage evaluation chain (defense-in-depth)
decision_chain:
  - keyword_filter        # deny_patterns, cheap regex
  - semantic_classifier   # small transformer / embedding similarity
  - llm_judge             # optional, budgeted fallback for borderline cases

# What to do in each case
actions:
  on_violation: block_with_reason   # include reason_code + offending_rule
  on_uncertain: escalate_or_mask    # escalate to llm_judge or mask/redact

# Response/output guards (post-generation scan)
response_guards:
  enabled: true
  recheck_output: true
  quarantine_on_violation: true
  reason_code_on_output_violation: OUTPUT_PII

# Resilience & abuse controls
rate_limit:
  enabled: true
  requests_per_minute: 60
  burst: 10
  reason_code_on_limit: RATE_LIMIT

# Observability configuration (for Grafana/Prometheus & logs)
telemetry:
  emit_reason_codes: true
  metrics:
    requests_counter: asg_requests_total                 # labels: decision, reason_code
    rule_hits_counter: asg_policy_hits_total             # labels: rule_id, reason_code
    pii_leaks_counter: asg_pii_leaks_total               # labels: stage (input|output)
    added_latency_histogram: asg_added_latency_ms_bucket # labels: stage (keyword|semantic|judge|total)
  logs:
    include_fields:
      - trace_id
      - stage              # keyword|semantic|judge|response_guard
      - decision           # allow|block|mask|quarantine
      - reason_code        # from reason_codes above
      - rule_id            # e.g., R-PI-001 (if applicable)
      - category           # PromptInjection, PII, etc.
      - severity
      - elapsed_ms
    redact_pii_in_logs: true

# User-facing error templates (no policy internals leaked)
messages:
  blocked_generic: "This request can’t be processed due to policy restrictions."
  blocked_pii: "This request includes sensitive personal data that cannot be processed."
  blocked_jailbreak: "The request attempts to bypass safety controls and was blocked."
  blocked_exfil: "The request appears to request secrets or exfiltrate data and was blocked."
  masked_output: "Certain sensitive details were redacted to protect privacy."

# Optional: allow-list examples (evaluated early, before deny)
allow_list:
  enabled: false
  patterns: []


