services:
  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: llm-asg-gateway:step3
    ports:
      - "8000:8000"
    depends_on:
      - mock-llm
    environment:
      - POLICY_PATH=/app/configs/policy.yaml
      - LLM_ENDPOINT=http://mock-llm:8001/echo
      - LOG_DIR=/app/logs
      - STATIC_DIR=/app/static
      - ADMIN_TOKEN=changeme123
      - REDACTION_ENABLED=true
      - REDACTION_KEEP_LAST4=true
      - REDACT_UPSTREAM=true
      - MAX_REQUEST_BYTES=32768
    volumes:
      - ./configs:/app/configs:ro
      - ./static:/app/static:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  mock-llm:
    build:
      context: .
      dockerfile: Dockerfile.mockllm
    image: llm-asg-mock:step3
    ports:
      - "8001:8001"

