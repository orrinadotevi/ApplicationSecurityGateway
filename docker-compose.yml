services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    ports:
      - "11434:11434"        # optional: access from host
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "curl", "-sSf", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 3s
      retries: 10

  gateway:
    build:
      context: .
      dockerfile: Dockerfile.gateway
    image: llm-asg-gateway:step4
    depends_on:
      - mock-llm
      - ollama
    ports:
      - "8000:8000"
    environment:
      - POLICY_PATH=/app/configs/policy.yaml
      - LLM_ENDPOINT=http://mock-llm:8001/echo
      - LOG_DIR=/app/logs
      - STATIC_DIR=/app/static
      - ADMIN_TOKEN=changeme123
      - REDACTION_ENABLED=true
      - REDACTION_KEEP_LAST4=true
      - REDACT_UPSTREAM=true
      - MAX_REQUEST_BYTES=32768
      - COUNT_ALL_MATCHES=true
      - LLM_PROVIDER=OLLAMA
      - OLLAMA_HOST=http://ollama:11434  # point to service
      - OLLAMA_MODEL=llama3
      - LLM_TIMEOUT_SECS=60
      - RETRY_MAX_ATTEMPTS=2
      - RETRY_BASE_MS=200
      - ADMIN_IP_ALLOWLIST=127.0.0.1,172.18.0.0/16,127.0.0.1/32
      - RATE_LIMIT_ENABLED=true
      - RATE_LIMIT_WINDOW_SECS=60
      - RATE_LIMIT_MAX_REQUESTS=60
      - JSON_LOGS=true
      - RATE_LIMIT_PER_MIN=60
      - RATE_LIMIT_BURST=20
      - FAIL_OPEN=false
      - LAT_BUFFER=1024
     # - RATE_LIMIT_BYPASS=true
    volumes:
      - ./configs:/app/configs:ro
      - ./static:/app/static:ro
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 3s
      retries: 3

  mock-llm:
    build:
      context: .
      dockerfile: Dockerfile.mockllm
    image: llm-asg-mock:step4
    ports:
      - "8001:8001"

volumes:
  ollama:

